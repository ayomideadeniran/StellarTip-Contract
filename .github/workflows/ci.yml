name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - name: Run clippy
        run: cargo clippy --target wasm32-unknown-unknown --release -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: wasm32-unknown-unknown
      - name: Run tests
        run: cargo test
      - name: Build for WASM
        run: cargo build --release --target wasm32-unknown-unknown
      - name: Verify WASM artifact
        run: |
          wasm_file="target/wasm32-unknown-unknown/release/stellar_tip.wasm"
          if [ -f "$wasm_file" ]; then
            echo "WASM artifact created: $(ls -lh "$wasm_file" | awk '{print $5}')"
          else
            echo "ERROR: WASM artifact not found at $wasm_file"
            exit 1
          fi
      - name: Optimize WASM
        run: |
          if command -v soroban &> /dev/null; then
            soroban contract optimize \
              --wasm target/wasm32-unknown-unknown/release/stellar_tip.wasm
            echo "Optimized WASM size: $(ls -lh target/wasm32-unknown-unknown/release/stellar_tip.optimized.wasm | awk '{print $5}')"
          else
            echo "soroban CLI not installed; skipping WASM optimization"
          fi
